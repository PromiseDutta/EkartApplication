# ================================
# Kafka Broker Connection
# ================================

# Address of Kafka broker (server) your app connects to
# localhost = running on same machine
# 9092 = default Kafka broker port
spring.kafka.bootstrap-servers=localhost:9092
# ================================
# Consumer Configuration
# ================================
# Consumer group name
# All consumers with same group-id share messages
spring.kafka.consumer.group-id=notification-group
# If no previous offset is found,
# start reading messages from beginning (earliest)
# Other option: latest
spring.kafka.consumer.auto-offset-reset=earliest
# How to convert Kafka message key (bytes -> String)
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# How to convert Kafka message value (bytes -> Java Object)
# Converts JSON -> PaymentSuccessEvent
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Allow JSON deserialization for specified packages
# '*' means trust all (use specific package in production)
spring.kafka.consumer.properties.spring.json.trusted.packages=*
# ================================
# Producer Configuration
# ================================
# Convert String key -> bytes before sending
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer

# Convert Java Object -> JSON -> bytes before sending
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer











